name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mac:
        description: 'Build macOS version'
        type: boolean
        default: true
      build_win:
        description: 'Build Windows version'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux version'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: 
          - ${{ fromJSON(inputs.build_win && '["windows-latest"]' || '[]') }}
          - ${{ fromJSON(inputs.build_mac && '["macos-latest"]' || '[]') }}
          - ${{ fromJSON(inputs.build_linux && '["ubuntu-latest"]' || '[]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Update update.json
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $exePath = Get-ChildItem -Path dist -Filter "VersePC-Setup-*.exe" | Select-Object -First 1
          if (-not $exePath) {
            Write-Error "Installer exe not found in dist/"
            exit 1
          }
          $hash = (Get-FileHash -Path $exePath.FullName -Algorithm SHA256).Hash.ToLower()
          $size = $exePath.Length
          $releaseDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $updateJson = @{
            version = $version
            releaseDate = $releaseDate
            releaseName = "VersePC v$version"
            releaseNotes = ""
            files = @{
              "win-x64" = @{
                url = "https://github.com/doujie081231/versePc/releases/download/v$version/VersePC-Setup-$version.exe"
                sha256 = $hash
                size = $size
              }
            }
            minSupportedVersion = $version
            force = $false
          } | ConvertTo-Json -Depth 4
          Set-Content -Path update.json -Value $updateJson -NoNewline
          Write-Host "update.json generated for version $version"

      - name: Push update.json to main
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp "${{ github.workspace }}/update.json" update.json
          git add update.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update update.json for v${{ github.ref_name }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}